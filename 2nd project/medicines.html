<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suraksha Circle – Medicine Management</title>
  <meta name="description" content="Manage daily medicines, track adherence, and view monthly compliance calendar.">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="app-header">
      <div class="logo"><i class="fas fa-shield-heart"></i><span>Suraksha Circle</span></div>
      <div class="header-actions">
        <div class="lang-toggle">
          <button data-lang="en" class="active">EN</button>
          <button data-lang="te">తె</button>
        </div>
        <button class="icon-btn"><i class="fas fa-bell"></i><span class="notification-badge">2</span></button>
        <div class="profile-dropdown">
          <div class="profile-avatar">RK</div>
          <div class="dropdown-menu">
            <a href="#"><i class="fas fa-user"></i> Profile</a>
            <a href="index.html"><i class="fas fa-arrow-right-arrow-left"></i> Switch Role</a>
            <div class="dropdown-divider"></div>
            <a href="#" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</a>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content container">
      <h1 class="mb-3" data-translate="Medicines">💊 Medicines</h1>

      <!-- Add Medicine Form -->
      <div class="card mb-3 fade-on-scroll">
        <h3 class="card-title mb-2">Add New Medicine</h3>
        <form id="addMedicineForm">
          <div style="display:flex;gap:16px;flex-wrap:wrap;">
            <div class="form-group" style="flex:2;min-width:200px;">
              <label for="medName">Medicine Name *</label>
              <input type="text" id="medName" placeholder="e.g., Metformin" required>
              <p class="form-error" id="medNameError">Please enter medicine name</p>
            </div>
            <div class="form-group" style="flex:1;min-width:120px;">
              <label for="medDosage">Dosage *</label>
              <input type="text" id="medDosage" placeholder="e.g., 500mg" required>
              <p class="form-error" id="medDosageError">Please enter dosage</p>
            </div>
          </div>
          <div style="display:flex;gap:16px;flex-wrap:wrap;">
            <div class="form-group" style="flex:1;min-width:140px;">
              <label for="medTimesPerDay">Times Per Day</label>
              <select id="medTimesPerDay">
                <option value="1">1 time</option>
                <option value="2">2 times</option>
                <option value="3" selected>3 times</option>
              </select>
            </div>
            <div id="timeInputs" style="display:flex;gap:12px;flex-wrap:wrap;flex:3;min-width:200px;"></div>
          </div>
          <div style="display:flex;gap:16px;flex-wrap:wrap;">
            <div class="form-group" style="flex:1;min-width:140px;">
              <label for="medStartDate">Start Date</label>
              <input type="date" id="medStartDate">
            </div>
            <div class="form-group" style="flex:1;min-width:140px;">
              <label for="medEndDate">End Date</label>
              <input type="date" id="medEndDate">
            </div>
          </div>
          <div class="form-group">
            <label for="medNotes">Notes</label>
            <textarea id="medNotes" rows="2" placeholder="e.g., Take after meals" style="resize:vertical;"></textarea>
          </div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Medicine</button>
        </form>
      </div>

      <!-- Medicine List -->
      <h3 class="mb-2">My Medicines</h3>
      <div id="medicineListPage"></div>

      <!-- Adherence Calendar -->
      <div class="card mt-3 fade-on-scroll">
        <h3 class="card-title mb-2">Adherence Tracker</h3>
        <div id="adherenceCalendar"></div>
        <div style="display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-secondary);">
            <span style="width:14px;height:14px;border-radius:4px;background:#C8E6C9;display:inline-block;"></span> All Taken
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-secondary);">
            <span style="width:14px;height:14px;border-radius:4px;background:#FFCDD2;display:inline-block;"></span> Missed
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-secondary);">
            <span style="width:14px;height:14px;border-radius:4px;background:#BBDEFB;display:inline-block;"></span> Today
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-secondary);">
            <span style="width:14px;height:14px;border-radius:4px;background:#f5f5f5;display:inline-block;"></span> Future
          </div>
        </div>
      </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="senior.html"><i class="fas fa-house"></i><span>Home</span></a>
      <a href="medicines.html" class="active"><i class="fas fa-pills"></i><span>Medicines</span></a>
      <a href="senior.html"><i class="fas fa-circle-check"></i><span>Check-In</span></a>
      <a href="health-vault.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>
  </div>

  <script src="data/mock-data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/medicines.js"></script>
</body>
</html>
